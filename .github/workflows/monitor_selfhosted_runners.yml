name: Monitor Self-Hosted Runners

on:
  schedule:
    - cron: "0 1 * * 1"   # every Monday at 1AM UTC
  workflow_dispatch:

permissions:
  actions: read  # Required to read artifacts

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Get list of runners
        id: runners
        run: |
          # Try to get repo-level runners first
          curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners \
            > repo_runners.json
          
          # Also get org-level runners
          curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/orgs/${{ github.repository_owner }}/actions/runners \
            > org_runners.json
          
          # Combine and deduplicate runner names
          repo_names=$(jq -r '.runners[]?.name // empty' repo_runners.json 2>/dev/null || echo "")
          org_names=$(jq -r '.runners[]?.name // empty' org_runners.json 2>/dev/null || echo "")
          
          # Fallback to known runner list if API fails
          known_runners="xsjevo04"
          
          if [ -n "$repo_names" ] || [ -n "$org_names" ]; then
            all_names=$(echo -e "$repo_names\n$org_names" | sort -u | tr '\n' ',' | sed 's/,$//') 
            echo "names=$all_names" >> $GITHUB_OUTPUT
            echo "Using API discovered runners: $all_names"
          else
            echo "names=$known_runners" >> $GITHUB_OUTPUT
            echo "Using fallback runner list: $known_runners"
          fi

      - name: Get artifacts
        id: artifacts
        run: |
          # Initialize empty artifacts file
          echo '{"artifacts":[]}' > artifacts.json
          
          page=1
          per_page=100
          
          while true; do
            echo "Fetching artifacts page $page..."
            
            # Fetch current page
            response=$(curl -s \
              -w "%{http_code}" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?page=$page&per_page=$per_page")
            
            # Extract status code and response body
            http_code="${response: -3}"
            response_body="${response%???}"
            
            if [ "$http_code" != "200" ]; then
              echo "API request failed with status $http_code"
              echo "Response: $response_body"
              exit 1
            fi
            
            # Save current page to temp file
            echo "$response_body" > "page_$page.json"
            
            # Check if this page has artifacts
            artifact_count=$(echo "$response_body" | jq '.artifacts | length')
            echo "Found $artifact_count artifacts on page $page"
            
            # If no artifacts on this page, we're done
            if [ "$artifact_count" -eq 0 ]; then
              echo "No more artifacts found, stopping pagination"
              break
            fi
            
            # Merge this page's artifacts with our combined file
            jq -s '{artifacts: (.[0].artifacts + .[1].artifacts)}' artifacts.json "page_$page.json" > artifacts_temp.json
            mv artifacts_temp.json artifacts.json
            
            # If we got fewer artifacts than per_page, this is the last page
            if [ "$artifact_count" -lt "$per_page" ]; then
              echo "Last page reached (fewer than $per_page artifacts)"
              break
            fi
            
            page=$((page + 1))
          done
          
          # Clean up temporary files
          rm -f page_*.json
          
          total_artifacts=$(jq '.artifacts | length' artifacts.json)
          echo "Total artifacts collected: $total_artifacts"

      - name: Check each runner heartbeat
        id: check
        run: |
          missing=""
          now=$(date -u +%s)

          for r in $(echo "${{ steps.runners.outputs.names }}" | tr ',' ' '); do
            [ -z "$r" ] && continue
            echo "Checking $r"

            ts=$(jq -r --arg r "$r" '[.artifacts[] | select(.name=="heartbeat-"+$r)] | sort_by(.updated_at) | last | .updated_at // empty' artifacts.json)

            if [ -z "$ts" ] || [ "$ts" == "null" ]; then
              echo "No heartbeat found for $r"
              missing="$missing $r"
              continue
            fi

            hb=$(date -d "$ts" +%s)
            diff=$((now - hb))

            if [ $diff -gt 691200 ]; then   # 8 days (weekly + 1 day buffer)
              echo "Heartbeat stale for $r (last seen: $ts)"
              missing="$missing $r"
            fi
          done

          echo "missing=$missing" >> $GITHUB_OUTPUT

      - name: Fail if any runner missing
        if: steps.check.outputs.missing != ''
        run: |
          echo "Missing or stale runners: ${{ steps.check.outputs.missing }}"
          exit 1

      - name: Send Teams alert via Power Automate
        if: failure()
        run: |
          echo "Sending Teams alert via Power Automate..."
          response=$(curl -s -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "type": "AdaptiveCard",
              "version": "1.3",
              "body": [
                {
                  "type": "TextBlock",
                  "text": "⚠️ Self-hosted Runner Alert",
                  "weight": "bolder",
                  "size": "medium",
                  "color": "attention"
                },
                {
                  "type": "TextBlock",
                  "text": "The following runners are offline or missing heartbeats:",
                  "wrap": true
                },
                {
                  "type": "TextBlock",
                  "text": "${{ steps.check.outputs.missing }}",
                  "wrap": true,
                  "fontType": "monospace"
                }
              ]
            }' \
            "${{ secrets.TEAMS_WEBHOOK_URL }}")
          
          http_code="${response: -3}"
          response_body="${response%???}"
          
          echo "HTTP Status: $http_code"
          echo "Response: $response_body"
          
          
          if [ "$http_code" != "200" ] && [ "$http_code" != "202" ]; then
            echo "Power Automate webhook failed with status $http_code"
          else
            echo "Teams alert sent successfully via Power Automate"
          fi
